{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "codex-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.gatewayApi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.gatewayApi.parentRefs | nindent 4 }}
  {{- if .Values.gatewayApi.hostnames }}
  hostnames:
    {{- toYaml .Values.gatewayApi.hostnames | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.gatewayApi.rules }}
    {{- range .Values.gatewayApi.rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "codex-lb.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
    {{- else }}
    - backendRefs:
        - name: {{ include "codex-lb.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
{{- end }}
